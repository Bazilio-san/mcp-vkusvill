# Шаблон файла deploy.yaml — параметры развёртывания MCP-сервера на удалённый сервер.
#
# Как пользоваться:
#   1. Скопируйте этот файл в корень проекта под именем deploy.yaml.
#   2. Заполните реквизиты доступа к серверу.
#   3. Убедитесь, что deploy.yaml добавлен в .gitignore (он содержит секреты).
#
# Поля, помеченные «можно оставить пустым», скрипт развёртывания выводит сам
# из package.json, .envrc и config/default.yaml.

# Доступ к серверу по SSH.
ssh:
  host: 203.0.113.10            # IP-адрес или имя хоста сервера
  user: root                   # пользователь SSH
  key: C:\Users\you\.ssh\id_rsa  # путь к приватному ключу на вашей машине (откуда запускается развёртывание)

# Расположение проектов на сервере.
paths:
  # Каталог, в котором лежат все node-проекты. Можно оставить пустым,
  # если задан projectDir (тогда берётся его родительский каталог).
  nodeProjectsDir: /opt/node
  # Каталог именно этого проекта. Можно оставить пустым —
  # тогда это nodeProjectsDir/<имя-сервиса>.
  projectDir: /opt/node/my-mcp-server

git:
  # SSH-адрес репозитория. Можно оставить пустым ('') — он формируется автоматически
  # из package.json → repository.url: https-адрес преобразуется в git@host:owner/repo.git.
  # Клонирование на сервере идёт по SSH, поэтому у сервера должен быть доступ к репозиторию.
  sshUrl: ''
  # Ветка, которую разворачиваем и за которой следит автообновление. По умолчанию master.
  branch: master

node:
  # Версия Node.js (должна быть установлена на сервере через nvm). Можно оставить пустым —
  # тогда берётся из .envrc проекта (строка вида `nvm use 22.17.1`).
  version: 22.17.1

service:
  # Имя systemd-сервиса и значение SERVICE_NAME в .env.
  # Можно оставить пустым — тогда берётся package.json → name.
  name: my-mcp-server
  # TCP-порт HTTP-сервера. Можно оставить пустым —
  # тогда берётся из config/default.yaml → webServer.port.
  port: 9048

# Публикация наружу через обратный прокси Caddy. Если домен не задан — публикация пропускается,
# сервис остаётся доступен только локально на сервере.
domain:
  name: my-mcp-server.example.com   # доменное имя; A-запись DNS должна указывать на сервер
  upstream: 127.0.0.1:9048          # куда Caddy проксирует; можно оставить пустым (127.0.0.1:<port>)

deploy:
  # Адрес для писем-уведомлений об автообновлении (deploy/config.yml → email).
  # Пусто — письма не отправляются.
  email: ''
