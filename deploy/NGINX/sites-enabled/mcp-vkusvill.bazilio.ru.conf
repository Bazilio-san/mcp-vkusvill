# sudo vim /etc/nginx/sites-enabled/mcp-vkusvill.bazilio.ru.conf

#Setup upstream for backend Node.js server
upstream mcp-vkusvill-time-gold-com  {
    server 127.0.0.1:9048;
    keepalive 8;
}

#The Nginx server instance
server {
    server_name mcp-vkusvill.bazilio.ru;
    access_log /var/log/nginx/mcp-vkusvill.bazilio.ru.log;
    error_log /var/log/nginx/mcp-vkusvill.bazilio.ru.ERROR.log;

    # SSE endpoint for MCP protocol - requires special streaming settings
    location /sse {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;
        proxy_set_header Cache-Control no-cache;
        proxy_set_header Connection '';

        proxy_http_version 1.1;
        proxy_pass http://mcp-vkusvill-time-gold-com/sse;
        proxy_redirect off;
        proxy_buffering off;
        proxy_cache off;
    }

    # All other endpoints (/, /health, /api/, /docs, /mcp)
    location / {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;

        proxy_pass http://mcp-vkusvill-time-gold-com/;
        proxy_redirect off;
    }

    listen 443 ssl http2;
    include snippets/ssl-wildcard-time-gold-com.conf;
    include snippets/ssl-params.conf;
    ssl_protocols  TLSv1.3;
}

server {
    if ($host = mcp-vkusvill.bazilio.ru) {
        return 301 https://$host$request_uri;
    }

    listen 0.0.0.0:80;
    server_name mcp-vkusvill.bazilio.ru;
    return 404;
}

