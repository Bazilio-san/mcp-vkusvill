name: mcp-vkusvill

services:
  app:
    container_name: mcp-vkusvill
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
    image: ${IMAGE_TAG:-mcp-vkusvill:latest}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-9048}:9048"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - SERVICE_NAME=${SERVICE_NAME:-mcp-vkusvill}
      - SERVICE_INSTANCE=${SERVICE_INSTANCE:-prod}
      - WS_PORT=9048
    volumes:
      - ./config/local.yaml:/app/config/local.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9048/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    mem_limit: 2g
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
